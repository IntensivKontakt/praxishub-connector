name: Sign-CLI Smoke (OIDC)

# De-Risk: validiert `sign code artifact-signing` (nicht-obsolet) mit azure-cli
# credential (OIDC) inkl. Exit-Code — der Weg für Tauris signCommand. Manuell.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    environment: release
    steps:
      - name: Tiny Dummy-.exe bauen
        shell: pwsh
        run: |
          dotnet new console -o smoke | Out-Null
          dotnet build smoke -c Release -o out | Out-Null
          Get-ChildItem out -Filter *.exe

      - name: sign-Tool installieren
        shell: pwsh
        run: dotnet tool install --global sign --prerelease

      - name: artifact-signing Flags (Discovery)
        shell: pwsh
        continue-on-error: true
        run: sign code artifact-signing --help

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Signieren via artifact-signing (Exit-Code sichtbar)
        shell: pwsh
        run: |
          sign code artifact-signing `
            --artifact-signing-endpoint "${{ vars.TRUSTED_SIGNING_ENDPOINT }}" `
            --artifact-signing-account "${{ vars.TRUSTED_SIGNING_ACCOUNT }}" `
            --artifact-signing-certificate-profile "${{ vars.TRUSTED_SIGNING_PROFILE }}" `
            --azure-credential-type azure-cli `
            --timestamp-url http://timestamp.acs.microsoft.com `
            -v information `
            "out/smoke.exe"
          Write-Host "SIGN_EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { throw "sign exit $LASTEXITCODE" }

      - name: Signatur verifizieren
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "out/smoke.exe"
          Write-Host "smoke.exe: $($sig.Status) — $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { exit 1 }
