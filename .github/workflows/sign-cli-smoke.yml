name: Sign-CLI Smoke (OIDC)

# De-Risk: validiert Microsofts `sign`-Dotnet-Tool mit Azure-CLI-Credential (OIDC,
# KEIN Client-Secret) — der Weg für Tauris signCommand (innere App-.exe). Schnell,
# damit wir das nicht erst im 14-Min-Release-Build merken. Manuell starten.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    environment: release
    steps:
      - name: Tiny Dummy-.exe bauen
        shell: pwsh
        run: |
          dotnet new console -o smoke | Out-Null
          dotnet build smoke -c Release -o out | Out-Null
          Get-ChildItem out -Filter *.exe

      - name: sign-Tool installieren
        shell: pwsh
        run: dotnet tool install --global sign --prerelease

      - name: Verfügbare sign-Subcommands (Flag-Discovery)
        shell: pwsh
        continue-on-error: true
        run: |
          sign code --help
          Write-Host "----- trusted-signing -----"
          sign code trusted-signing --help

      - name: Azure Login (OIDC, kein Secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Signieren via sign-Tool (azure-cli credential = OIDC)
        shell: pwsh
        continue-on-error: true
        run: |
          sign code trusted-signing `
            --trusted-signing-endpoint "${{ vars.TRUSTED_SIGNING_ENDPOINT }}" `
            --trusted-signing-account "${{ vars.TRUSTED_SIGNING_ACCOUNT }}" `
            --trusted-signing-certificate-profile "${{ vars.TRUSTED_SIGNING_PROFILE }}" `
            --azure-credential-type azure-cli `
            --timestamp-url http://timestamp.acs.microsoft.com `
            --verbosity information `
            "out/*.exe"

      - name: Signatur verifizieren
        shell: pwsh
        run: |
          $bad = 1
          Get-ChildItem out -Filter *.exe | ForEach-Object {
            $sig = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($sig.Status) — $($sig.SignerCertificate.Subject)"
            if ($sig.Status -eq 'Valid') { $bad = 0 }
          }
          exit $bad
