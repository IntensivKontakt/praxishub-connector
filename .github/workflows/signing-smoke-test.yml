name: Signing Smoke Test

# Validiert die komplette Kette OIDC -> Azure -> Trusted/Artifact Signing,
# UNABHÄNGIG vom Connector-Code. Baut eine winzige Dummy-.exe und signiert sie.
# Manuell starten (Actions-Tab -> Run workflow), sobald das Certificate Profile
# nach der Identitätsprüfung existiert.

on:
  workflow_dispatch: {}

permissions:
  id-token: write   # für OIDC
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    environment: release   # nutzt den Federated Credential 'github-env-release'
    steps:
      - name: Tiny Dummy-.exe bauen
        shell: pwsh
        run: |
          dotnet new console -o smoke | Out-Null
          dotnet build smoke -c Release -o out | Out-Null
          Get-ChildItem out -Filter *.exe

      - name: Azure Login (OIDC, kein Secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Signieren via Trusted Signing
        # HINWEIS: ggf. neueste Version der Action prüfen (Marketplace: azure/trusted-signing-action)
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\out
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Signatur verifizieren
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem out -Filter *.exe | ForEach-Object {
            $sig = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($sig.Status) — $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') { $bad = 1 }
          }
          exit $bad
