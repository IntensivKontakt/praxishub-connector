name: Build & Sign (Release)

# Release-Build. Signiert den NSIS-Installer per Azure Trusted Signing (OIDC,
# bewährt). Hinweis: Tauris `signCommand` (innere App-.exe während des Builds)
# scheiterte an einem %1-Substitutions-Bug der Tauri-CLI — daher Post-Build-
# Signierung des Installers + Neuerzeugung der Updater-.sig über den signierten
# Installer. Siehe docs/SIGNING.md („Bekannte Grenzen").

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: Dependencies & Tauri-Bundle bauen
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm ci
          npm run tauri build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Installer signieren (Trusted Signing)
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: target\release\bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Die Updater-.sig wurde während des Bundles über den NOCH unsignierten
      # Installer erzeugt → nach dem Authenticode-Signieren neu erzeugen, sonst
      # schlägt die Auto-Update-Signaturprüfung fehl. Best-effort (bricht nicht).
      - name: Updater-.sig neu erzeugen (über signierten Installer)
        continue-on-error: true
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          $exe = Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          npx tauri signer sign --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "" "$($exe.FullName)"

      - name: Signatur verifizieren (Installer)
        shell: pwsh
        run: |
          $exe = Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          $sig = Get-AuthenticodeSignature $exe.FullName
          Write-Host "$($exe.Name): $($sig.Status) — $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: praxishub-connector-signed
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
