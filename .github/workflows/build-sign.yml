name: Build & Sign (Release)

# Echter Release-Build. Signiert App-.exe UND Installer WÄHREND des Builds via
# Tauris signCommand (Microsoft `sign`-Tool + Azure Trusted Signing, OIDC/azure-cli
# — kein Client-Secret). Dadurch ist die Updater-.sig über den bereits signierten
# Installer korrekt. Triggert auf Versions-Tags (v*) oder manuell.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: sign-Tool installieren (für Tauri signCommand)
        shell: pwsh
        run: |
          dotnet tool install --global sign --prerelease
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # OIDC-Login MUSS vor dem Build laufen, damit signCommand (azure-cli credential)
      # während `tauri build` authentifiziert ist.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + Signieren (signCommand signiert App-.exe + Installer, dann Updater-.sig)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm ci
          npm run tauri build

      - name: Signaturen verifizieren
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem target/release/bundle/nsis -Filter *.exe | ForEach-Object {
            $sig = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($sig.Status) — $($sig.SignerCertificate.Subject)"
            if ($sig.Status -ne 'Valid') { $bad = 1 }
          }
          # auch die innere App-.exe
          $app = Get-ChildItem target/release -Filter praxishub-connector.exe
          if ($app) {
            $s = Get-AuthenticodeSignature $app.FullName
            Write-Host "App-exe: $($s.Status) — $($s.SignerCertificate.Subject)"
            if ($s.Status -ne 'Valid') { $bad = 1 }
          }
          exit $bad

      - uses: actions/upload-artifact@v4
        with:
          name: praxishub-connector-signed
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
