name: Build & Sign (Release)

# Release-Build. Kompiliert ZUERST ohne Bundle (langer Schritt, kein Azure), dann
# FRISCHES OIDC-Login direkt vor `tauri bundle` — die GitHub-OIDC-Assertion ist nur
# ~5 Min gültig, der Compile davor würde sie sonst ablaufen lassen (AADSTS700024).
# signCommand (src-tauri/sign-wrap.ps1 → Microsoft `sign`-Tool, Azure Trusted Signing)
# signiert App-.exe + Installer während des Bundles (vor der Updater-.sig).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: sign-Tool installieren
        shell: pwsh
        run: |
          dotnet tool install --global sign --prerelease
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Kompilieren ohne Bundle (langer Schritt, kein Azure nötig)
        run: |
          npm ci
          npm run tauri build -- --no-bundle

      # Frisches OIDC-Login DIREKT vor dem Bundle, damit die ~5-min-Assertion beim
      # signCommand noch gültig ist (sonst AADSTS700024 nach langem Compile).
      - name: Azure Login (OIDC) — frisch vor dem Signieren
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bundle + Signieren (signCommand schnell, in der Token-Frist)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri bundle

      - name: sign-Log (Diagnose, immer)
        if: always()
        shell: pwsh
        run: Get-Content "$env:RUNNER_TEMP\sign.log" -ErrorAction SilentlyContinue

      - name: Signaturen verifizieren (App-.exe + Installer)
        shell: pwsh
        run: |
          $bad = 0
          $app = Get-ChildItem target/release -Filter praxishub-connector.exe -ErrorAction SilentlyContinue
          if ($app) {
            $s = Get-AuthenticodeSignature $app.FullName
            Write-Host "App-exe: $($s.Status) - $($s.SignerCertificate.Subject)"
            if ($s.Status -ne 'Valid') { $bad = 1 }
          } else { Write-Host "App-exe nicht gefunden"; $bad = 1 }
          Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | ForEach-Object {
            $s = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($s.Status) - $($s.SignerCertificate.Subject)"
            if ($s.Status -ne 'Valid') { $bad = 1 }
          }
          exit $bad

      - uses: actions/upload-artifact@v4
        with:
          name: praxishub-connector-signed
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
