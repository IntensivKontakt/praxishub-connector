name: Build & Sign (Release)

# Release-Build. Kompiliert ZUERST ohne Bundle (langer Schritt, kein Azure), dann
# FRISCHES OIDC-Login direkt vor `tauri bundle` — die GitHub-OIDC-Assertion ist nur
# ~5 Min gültig, der Compile davor würde sie sonst ablaufen lassen (AADSTS700024).
# signCommand (src-tauri/sign-wrap.ps1 → Microsoft `sign`-Tool, Azure Trusted Signing)
# signiert App-.exe + Installer während des Bundles (vor der Updater-.sig).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Release-Tag (z. B. v0.2.0). Gesetzt = signierten Installer als
          öffentliches GitHub-Release veröffentlichen (Tag wird am gewählten
          Branch-Stand erzeugt). Leer = nur bauen/signieren ohne Release.
        required: false
        default: ""

permissions:
  id-token: write
  contents: write # für das Veröffentlichen des GitHub-Release bei Tag-Push

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: sign-Tool installieren
        shell: pwsh
        run: |
          dotnet tool install --global sign --prerelease
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Kompilieren ohne Bundle (langer Schritt, kein Azure nötig)
        run: |
          npm ci
          npm run tauri build -- --no-bundle

      # Frisches OIDC-Login DIREKT vor dem Bundle, damit die ~5-min-Assertion beim
      # signCommand noch gültig ist (sonst AADSTS700024 nach langem Compile).
      - name: Azure Login (OIDC) — frisch vor dem Signieren
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bundle + Signieren (signCommand schnell, in der Token-Frist)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri bundle

      - name: sign-Log (Diagnose, immer)
        if: always()
        shell: pwsh
        run: Get-Content "$env:RUNNER_TEMP\sign.log" -ErrorAction SilentlyContinue

      - name: Signatur verifizieren (Installer = ausgeliefertes Artefakt)
        shell: pwsh
        run: |
          # Maßgeblich ist der INSTALLER: er enthält die bereits signierte App-.exe
          # (signCommand signiert in Reihenfolge Patch → App-.exe → makensis → Installer).
          # Die standalone target/release/*.exe ist nur ein Build-Artefakt (wird nicht
          # ausgeliefert) und kann unsigniert erscheinen — daher nur Info.
          $bad = 1
          Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | ForEach-Object {
            $s = Get-AuthenticodeSignature $_.FullName
            Write-Host "Installer $($_.Name): $($s.Status) - $($s.SignerCertificate.Subject)"
            if ($s.Status -eq 'Valid') { $bad = 0 }
          }
          $app = Get-ChildItem target/release -Filter praxishub-connector.exe -ErrorAction SilentlyContinue
          if ($app) {
            $s = Get-AuthenticodeSignature $app.FullName
            Write-Host "(info) standalone App-exe: $($s.Status)"
          }
          exit $bad

      - name: Eingebettete App-.exe im Installer prüfen (entpacken)
        shell: pwsh
        run: |
          # 100%-Beleg: Installer entpacken und die DARIN gepackte App-.exe prüfen
          # (das ist die exe, die nach der Installation auf dem Rechner liegt).
          $inst = Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          7z x "$($inst.FullName)" "-oextracted" -y | Out-Null
          $exe = Get-ChildItem extracted -Recurse -Filter praxishub-connector.exe | Select-Object -First 1
          if (-not $exe) { Write-Host "Eingebettete App-.exe nicht gefunden"; exit 1 }
          $s = Get-AuthenticodeSignature $exe.FullName
          Write-Host "Eingebettete App-.exe: $($s.Status) - $($s.SignerCertificate.Subject)"
          if ($s.Status -ne 'Valid') { exit 1 }

      - uses: actions/upload-artifact@v4
        with:
          name: praxishub-connector-signed
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig

      # Signierten Installer als öffentliches GitHub-Release veröffentlichen →
      # stabile, öffentlich herunterladbare URL. Bei Tag-Push (v*) automatisch;
      # per workflow_dispatch nur, wenn ein `tag` angegeben wurde (Tag wird dann
      # am gewählten Branch-Stand erzeugt).
      - name: GitHub-Release veröffentlichen
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
          fail_on_unmatched_files: true
          generate_release_notes: true
