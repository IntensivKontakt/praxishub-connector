name: Build & Sign (Release)

# Release-Build. signCommand (src-tauri/sign-wrap.ps1, pwsh → Microsoft `sign`-Tool,
# Azure Trusted Signing via OIDC/azure-cli) signiert App-.exe UND Installer WÄHREND
# des Builds (nach dem exe-Patch, vor der Updater-.sig → .sig korrekt). Triggert auf
# Versions-Tags (v*) oder manuell.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: sign-Tool installieren (für signCommand)
        shell: pwsh
        run: |
          dotnet tool install --global sign --prerelease
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # OIDC-Login VOR dem Build: signCommand (azure-cli credential) braucht die
      # az-Session während `tauri build`.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + Signieren (signCommand: App-.exe + Installer, dann Updater-.sig)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm ci
          npm run tauri build

      - name: sign-Log (Diagnose, immer)
        if: always()
        shell: pwsh
        run: Get-Content "$env:RUNNER_TEMP\sign.log" -ErrorAction SilentlyContinue

      - name: Signaturen verifizieren (App-.exe + Installer)
        shell: pwsh
        run: |
          $bad = 0
          $app = Get-ChildItem target/release -Filter praxishub-connector.exe -ErrorAction SilentlyContinue
          if ($app) {
            $s = Get-AuthenticodeSignature $app.FullName
            Write-Host "App-exe: $($s.Status) — $($s.SignerCertificate.Subject)"
            if ($s.Status -ne 'Valid') { $bad = 1 }
          } else { Write-Host "App-exe nicht gefunden"; $bad = 1 }
          Get-ChildItem target/release/bundle/nsis -Filter *-setup.exe | ForEach-Object {
            $s = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($s.Status) — $($s.SignerCertificate.Subject)"
            if ($s.Status -ne 'Valid') { $bad = 1 }
          }
          exit $bad

      - uses: actions/upload-artifact@v4
        with:
          name: praxishub-connector-signed
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
